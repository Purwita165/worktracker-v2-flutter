name: worktracker_v2
description: "A Flutter SQLite WorkTracker"
publish_to: 'none'

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.1
  path_provider: ^2.1.2
  intl: ^0.19.0

  
dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

flutter_icons:
  android: true
  image_path: "assets/icon/worktracker_icon.png"